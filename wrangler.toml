# Flavor Doctors — Cloudflare Workers configuration
name = "flavordoctors"
main = "src/worker/index.ts"
compatibility_date = "2026-06-01"

# React SPA served as static assets; API + image routes always hit the Worker.
[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
# All requests run through the Worker so HTML gets per-route SEO metadata
# injected at the edge (titles, canonicals, OG tags, JSON-LD).
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "flavordoctors-db"
database_id = "bed2572c-6958-4c16-97a0-f3d500b52fd3"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "PRODUCT_IMAGES"
bucket_name = "flavordoctors-product-images"

[ai]
binding = "AI"

# Cloudflare Email Service (outbound transactional email; Workers Paid).
# Requires a sending domain onboarded in the dashboard:
# Compute → Email Service → Email Sending → Onboard Domain,
# then set EMAIL_FROM below to an address on that domain.
[[send_email]]
name = "EMAIL"

# Nightly at 16:00 UTC: refill reminders, win-back emails, drop notifications.
[triggers]
crons = ["0 16 * * *", "*/10 * * * *"]

[vars]
# Comma-separated list of emails that are granted admin on register/login.
ADMIN_EMAILS = "jeromy.darling@gmail.com"
# Canonical public domain — workers.dev requests 301 here.
CANONICAL_HOST = "flavordoctors.com"
# Optional "from" address for transactional email (used with RESEND_API_KEY secret).
EMAIL_FROM = "Flavor Doctors <orders@flavordoctors.com>"
# GA4: measurement ID here; API secret via `wrangler secret put GA4_API_SECRET`.
GA4_MEASUREMENT_ID = "G-T9219KKX2X"
# Google Search Console ownership proof, injected as a <meta> tag on every page.
GSC_VERIFICATION = "qZY7n3mlZTVMaZ879VwrJ0_UVSD_eY0k_T-x5q0030k"
BUSINESS_ADDRESS = "Flavor Doctors · New Prague, MN, USA"

# Secrets (set via `wrangler secret put <NAME>`):
#   STRIPE_SECRET_KEY      — Stripe API secret key (sk_...)
#   STRIPE_WEBHOOK_SECRET  — Stripe webhook signing secret (whsec_...)
#   JWT_SECRET             — random string used to sign auth tokens
#   RESEND_API_KEY         — (optional) Resend API key for confirmation emails
