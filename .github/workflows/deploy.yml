name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      seed:
        description: 'Re-seed the product catalog (overwrites ai_description/image keys on the 34 seed SKUs!)'
        type: boolean
        default: false

concurrency: deploy # never run two deploys at once

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN repo secret is not set. Create an API token (template: 'Edit Cloudflare Workers' + D1 Edit) and add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply flavordoctors-db --remote

      - name: Seed product catalog (manual opt-in only)
        if: github.event_name == 'workflow_dispatch' && inputs.seed
        run: npx wrangler d1 execute flavordoctors-db --remote --file=./seed.sql

      - name: Deploy Worker
        run: npx wrangler deploy

      # Secrets are synced after deploy so the Worker exists on the very first run
      # (wrangler secret put cannot target a Worker that has never been deployed).
      - name: Sync Worker secrets
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GA4_API_SECRET: ${{ secrets.GA4_API_SECRET }}
        run: |
          sync() {
            if [ -n "$2" ]; then
              printf '%s' "$2" | npx wrangler secret put "$1"
              echo "synced $1"
            else
              echo "::notice::$1 not set in GitHub secrets — leaving existing Worker secret (if any) unchanged"
            fi
          }
          sync STRIPE_SECRET_KEY "$STRIPE_SECRET_KEY"
          sync STRIPE_WEBHOOK_SECRET "$STRIPE_WEBHOOK_SECRET"
          sync RESEND_API_KEY "$RESEND_API_KEY"
          sync GA4_API_SECRET "$GA4_API_SECRET"

          # JWT_SECRET: use the GitHub secret if provided; otherwise auto-generate
          # one the first time only (regenerating would invalidate all sessions).
          if [ -n "$JWT_SECRET" ]; then
            sync JWT_SECRET "$JWT_SECRET"
          elif ! npx wrangler secret list | grep -q '"JWT_SECRET"'; then
            openssl rand -hex 32 | npx wrangler secret put JWT_SECRET
            echo "generated and set a new JWT_SECRET"
          else
            echo "JWT_SECRET already set on the Worker — keeping it"
          fi
