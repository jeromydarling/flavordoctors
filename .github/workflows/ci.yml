name: CI

on:
  pull_request:
  push:
    branches-ignore: [main] # pushes to main are covered by the Deploy workflow

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Validate wrangler config (dry run)
        run: npx wrangler deploy --dry-run
