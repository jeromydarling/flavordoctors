name: Generate Product Images

on:
  workflow_dispatch:
    inputs:
      regenerate_all:
        description: 'Regenerate ALL product images (default: only SKUs missing an image)'
        type: boolean
        default: false
  # Alternative trigger: commit any change to .github/image-gen-trigger
  # (useful when workflow_dispatch isn't available, e.g. before this file
  # lands on the default branch). Generates missing images only.
  push:
    paths: ['.github/image-gen-trigger']

concurrency: flux-image-gen

jobs:
  flux:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Require Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN repo secret is not set. Create an API token with Workers AI (Read), Workers R2 Storage (Edit), and D1 (Edit) permissions, then add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Flux images and publish to R2
        env:
          REGENERATE_ALL: ${{ inputs.regenerate_all }}
        run: node scripts/generate-images.mjs
